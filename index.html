<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI-Tutor 情境展示</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,400&family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1c1814;
  --paper: #ffffff;
  --ink: #1c1814;
  --ink-soft: #3a3530;
  --ink-muted: #7a7068;
  --ink-faint: #c4b8a8;
  --cream: #ede5d8;
  --warm-glow: #faf5ee;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: #fff;
  font-family: 'Noto Sans TC', sans-serif;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  position: relative;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 80%, rgba(196,146,18,0.14) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 20%, rgba(74,64,216,0.10) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.015) 0%, transparent 80%);
  pointer-events: none;
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 520px;
  display: flex;
  flex-direction: column;
  gap: 32px;
}

/* ── HEADER ── */
.header {
  text-align: center;
}

.eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 16px;
}

.title {
  font-family: 'Fraunces', serif;
  font-size: 40px;
  font-weight: 900;
  line-height: 1.2;
  letter-spacing: -1px;
  color: #fff;
  margin-bottom: 12px;
}
.title em {
  font-style: italic;
  background: linear-gradient(135deg, #f0c040 0%, #e8883d 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.subtitle {
  font-size: 17px;
  color: rgba(255,255,255,0.45);
  line-height: 1.6;
}

/* ── CARDS ── */
.cards {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.card {
  display: block;
  background: var(--paper);
  border-radius: 16px;
  padding: 24px 24px 22px;
  text-decoration: none;
  color: var(--ink);
  position: relative;
  overflow: hidden;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 12px 36px rgba(0,0,0,0.08);
}
.card:active {
  transform: scale(0.98);
}

.card-icon {
  font-size: 32px;
  margin-bottom: 10px;
  display: block;
}

.card-title {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 6px;
}

.card-desc {
  font-size: 15px;
  color: var(--ink-muted);
  line-height: 1.6;
}

.card-arrow {
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 20px;
  color: var(--ink-faint);
  transition: transform 0.2s;
}
.card:active .card-arrow {
  transform: translateY(-50%) translateX(3px);
}

/* ── COLOR ACCENT STRIPS ── */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 4px;
}
.card-individual::before { background: linear-gradient(90deg, #4a40d8, #6c63ff); }
.card-group::before { background: linear-gradient(90deg, #c93a22, #e8553d); }
.card-english::before { background: linear-gradient(90deg, #1a7d5a, #2aad7a); }
.card-afterschool::before { background: linear-gradient(90deg, #b8870e, #e8b830); }

/* ── TAGS ── */
.card-tags {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.tag {
  font-size: 12px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 100px;
  background: #f5f0e8;
  color: var(--ink-muted);
}

/* ── FOOTER ── */
.footer {
  text-align: center;
  font-size: 13px;
  color: rgba(255,255,255,0.25);
}

/* ── ANIMATIONS ── */
@keyframes fade-up {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.header {
  opacity: 0;
  animation: fade-up 0.6s ease-out 0.1s forwards;
}
.cards .card:nth-child(1) { opacity: 0; animation: fade-up 0.5s ease-out 0.2s forwards; }
.cards .card:nth-child(2) { opacity: 0; animation: fade-up 0.5s ease-out 0.3s forwards; }
.cards .card:nth-child(3) { opacity: 0; animation: fade-up 0.5s ease-out 0.4s forwards; }
.cards .card:nth-child(4) { opacity: 0; animation: fade-up 0.5s ease-out 0.5s forwards; }
.footer { opacity: 0; animation: fade-up 0.5s ease-out 0.6s forwards; }

@media (min-width: 768px) {
  .title { font-size: 48px; }
  .container { max-width: 560px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="eyebrow">AI-Tutor 情境展示</div>
    <h1 class="title"><em>補習班的一天</em></h1>
    <p class="subtitle">選擇您的補習班類型<br>看 AI-Tutor 如何融入您的日常</p>
  </div>

  <div class="cards">
    <a class="card card-individual" href="presentation_scenario_demo.html">
      <span class="card-icon">🎯</span>
      <div class="card-title">個別指導班</div>
      <div class="card-desc">1 對 1 ~ 1 對 4，老師針對每個學生個別教學</div>
      <div class="card-tags">
        <span class="tag">即時弱點追蹤</span>
        <span class="tag">AI 教學建議</span>
        <span class="tag">個人化報告</span>
      </div>
      <span class="card-arrow">›</span>
    </a>

    <a class="card card-group" href="presentation_group.html">
      <span class="card-icon">👥</span>
      <div class="card-title">團班補習班</div>
      <div class="card-desc">20-30 人大班，一個老師顧到每個學生</div>
      <div class="card-tags">
        <span class="tag">自動改卷</span>
        <span class="tag">差異化作業</span>
        <span class="tag">全班弱點分析</span>
      </div>
      <span class="card-arrow">›</span>
    </a>

    <a class="card card-english" href="presentation_english.html">
      <span class="card-icon">🌍</span>
      <div class="card-title">兒童美語班</div>
      <div class="card-desc">聽說讀寫四維追蹤，讓家長看得懂孩子的英文程度</div>
      <div class="card-tags">
        <span class="tag">聽說讀寫雷達圖</span>
        <span class="tag">單字遊戲化</span>
        <span class="tag">回家練習推播</span>
      </div>
      <span class="card-arrow">›</span>
    </a>

    <a class="card card-afterschool" href="presentation_afterschool.html">
      <span class="card-icon">🏠</span>
      <div class="card-title">兒童安親班</div>
      <div class="card-desc">作業盯得住、弱點補得到、家長即時知道</div>
      <div class="card-tags">
        <span class="tag">作業進度追蹤</span>
        <span class="tag">到班自動通知</span>
        <span class="tag">每日報告</span>
      </div>
      <span class="card-arrow">›</span>
    </a>
  </div>

  <div class="footer">AI-Tutor — 讓補習班的每一天都被看見</div>
</div>

</body>
</html>
